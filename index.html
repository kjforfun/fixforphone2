<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>陀螺 COMBOS</title>
<link rel="stylesheet" href="style.css?v=12">
</head>

<body>

<header class="top-header">
  <h1>陀螺 COMBOS</h1>
</header>

<main>

<section class="card" id="searchPanel">

  <div class="filters">

    <div class="filter-row">
      <select id="bladeSelect"></select>
      <button type="button" id="clearBlade">✕</button>
    </div>

    <div class="filter-double">

      <div class="filter-row">
        <select id="ratchetSelect"></select>
        <button type="button" id="clearRatchet">✕</button>
      </div>

      <div class="filter-row">
        <select id="bitSelect"></select>
        <button type="button" id="clearBit">✕</button>
      </div>

    </div>

  </div>

  <!-- 名次篩選 -->

  <div class="place-filter">

    <button
      type="button"
      class="place-btn active"
      data-place="">
      全部
    </button>

    <button
      type="button"
      class="place-btn"
      data-place="1st">
      🏆 冠軍
    </button>

    <button
      type="button"
      class="place-btn"
      data-place="2nd">
      2nd
    </button>

    <button
      type="button"
      class="place-btn"
      data-place="3rd">
      3rd
    </button>

  </div>

  <div class="bottom-actions">

    <button
      type="button"
      id="clearAllButton">
      清除全部
    </button>

    <span id="recordCount">
      0 筆
    </span>

  </div>

</section>

<section class="card">

  <h2>🏆 熱門組合 Top 3</h2>

  <div id="topCombos"></div>

</section>

<section class="card">

  <div class="ranking-grid custom-ranking">

    <div>
      <h3>熱門上蓋</h3>
      <div id="bladeRanking"></div>
    </div>

    <div>
      <h3>熱門固鎖</h3>
      <div id="ratchetRanking"></div>
    </div>

    <div>
      <h3>熱門軸心</h3>
      <div id="bitRanking"></div>
    </div>

  </div>

</section>

<section class="card">

  <h2>符合條件的賽果</h2>

  <div id="resultList"></div>

</section>

</main>

<script src="analysis.js?v=12"></script>
<script src="ui.js?v=12"></script>

</body>

</html>
